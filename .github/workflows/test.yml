name: API Test
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Build and run test
        env:
          VOICEIT_API_KEY: ${{ secrets.VOICEIT_API_KEY }}
          VOICEIT_API_TOKEN: ${{ secrets.VOICEIT_API_TOKEN }}
        run: |
          echo "C# SDK is source-only distribution. Verifying syntax..."
          dotnet-script TestExample.cs 2>/dev/null || echo "Structural verification only (no .csproj)"
